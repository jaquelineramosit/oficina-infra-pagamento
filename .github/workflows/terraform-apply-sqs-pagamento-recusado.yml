name: Terraform Apply SQS Pagamento Recusado

on:
  push:
    branches: [ "main" ]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply-sqs-pagamento-recusado.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-sqs-pagamento-recusado-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: terraform

jobs:
  apply:
    name: Apply sqs-pagamento-recusado
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets['AWS_ACCESS_KEY_ID'] }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets['AWS_SECRET_ACCESS_KEY'] }}
      AWS_SESSION_TOKEN: ${{ secrets['AWS_SESSION_TOKEN'] }}
      AWS_REGION: ${{ secrets['AWS_REGION'] }}
      TF_STATE_BUCKET: ${{ secrets['TF_STATE_BUCKET'] }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'oficina' }}
      QUEUE_NAME: sqs-pagamento-recusado

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            AWS_REGION
            TF_STATE_BUCKET
          )

          missing=0
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "${var_name} secret is required."
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          {
            printf 'TF_VAR_aws_region=%s\n' "${AWS_REGION}"
            printf 'TF_VAR_project_name=%s\n' "${PROJECT_NAME}"
            printf 'TF_VAR_environment=%s\n' "${ENVIRONMENT}"
            printf 'TF_VAR_queue_name=%s\n' "${QUEUE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists."
          else
            echo "Creating Terraform state bucket."

            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="region=${AWS_REGION}" -backend-config="key=oficina-infra-pagamento-sqs/${ENVIRONMENT}/${QUEUE_NAME}/terraform.tfstate" -backend-config="use_lockfile=true"

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Validate SQS queue
        shell: bash
        run: |
          set -euo pipefail

          queue_url="$(aws sqs get-queue-url \
            --queue-name "${QUEUE_NAME}" \
            --region "${AWS_REGION}" \
            --query 'QueueUrl' \
            --output text)"

          dlq_url="$(aws sqs get-queue-url \
            --queue-name "${QUEUE_NAME}-dlq" \
            --region "${AWS_REGION}" \
            --query 'QueueUrl' \
            --output text)"

          if [ -z "${queue_url}" ] || [ -z "${dlq_url}" ]; then
            echo "SQS queue validation failed."
            exit 1
          fi

          echo "SQS queue validated."
